version: '3.8'

services:
  # ==========================================
  # Backend - NestJS API
  # ==========================================
  backend:
    container_name: plantapp-backend
    build:
      context: ./plant-app_back
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - CORS_ORIGIN=http://localhost:4200,http://localhost
      - PERENUAL_API_KEY=sk-exLE69aa5a751646615239
      - PEXELS_API_KEY=563492ad6f917000010000011234567890abcdef1234567890abcdef
      - CACHE_TTL_HOURS=24
    networks:
      - plantapp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/ping', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ==========================================
  # Frontend - Angular + Nginx
  # ==========================================
  frontend:
    container_name: plantapp-frontend
    build:
      context: ./PlantApp_Front
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - backend
    networks:
      - plantapp-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  plantapp-network:
    driver: bridge

# ==========================================
# COMANDOS SIMPLES:
# ==========================================
# Iniciar:    docker-compose up --build
# Detener:    docker-compose down
# Ver logs:   docker-compose logs -f
# Reiniciar:  docker-compose restart
# ==========================================
