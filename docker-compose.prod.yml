version: '3.8'

# ==========================================
# Configuración adicional para PRODUCCIÓN
# Este archivo se usa junto con docker-compose.yml
# Uso: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ==========================================

services:
  backend:
    environment:
      - NODE_ENV=production
      - CORS_ORIGIN=${FRONTEND_URL}
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
